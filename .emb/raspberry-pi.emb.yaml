# drm-cxx examples on Raspberry Pi (PiOS aarch64).
#
# Hardware/OS facts (toolchain, sysroot image, partition, cpu tuning, base
# DRM/input/EGL/GBM/seat stack) come from emb's shipped board library
# (boards/raspberry-pi.emb.yaml); each target `extends` a board and overlays the
# one extra dev package drm-cxx needs on top of that base: libdisplay-info
# >= 0.2.0, which trixie ships.
#
#   emb cross . --target rpi4-trixie --build
#
# v4l2_decode exercises the stateful V4L2 decoder -> KMS path on the Pi 4's
# bcm2835-codec (/dev/video10). The Pi 5 has no hardware H.264 decoder, so the
# example builds there but finds no decoder at run time.
id: drm-cxx
type: app
supported_archs: [arm64]
supported_host_types: [ubuntu, fedora]

build:
  app_path: .
  archs: [arm64]
  modes: [release]
  output: bundles

cross:
  package:
    name: drm-cxx-examples
    version: 0.1.0
    maintainer: "Joel Winarske <joel.winarske@gmail.com>"
    description: "drm-cxx example programs, cross-built by emb"
    section: utils
    bin: examples/v4l2_decode   # relative to the backend build dir
    install_dir: /usr/bin

  targets:
    rpi4-trixie:
      extends: rpi4-trixie
      # Feature toggles that gate the augments below. Opt-out: each is ON by
      # default (a plain build augments everything, as before), so a lean build
      # drops a heavy source dep with e.g. --define DRM_CXX_BUILD_CAMERA=OFF.
      # They map to real drm-cxx CMake options, so the same value also
      # configures the embedder build (no unused-variable warnings).
      defines: &feature_defines
        DRM_CXX_BLEND2D: 'ON'       # blend2d augment -> drm::capture / drm::csd
        DRM_CXX_BUILD_CAMERA: 'ON'  # libcamera augment -> camera example
        DRM_CXX_EGL: 'ON'           # shadertoy-cxx augment -> shadertoy_egl
      sysroot:
        dev_packages:
          - libdisplay-info-dev   # trixie ships >= 0.2.0
          - libgtest-dev          # GoogleTest for the on-target gtest binaries
          - libjpeg62-turbo-dev   # drm::capture JPEG encoder (libjpeg-turbo)
          - libyuv-dev            # camera example: YUY2/MJPEG->NV12 libyuv fallback
      augment: &augment_libs
        # blend2d (Zlib license) backs drm::capture's PNG screenshots. Build it
        # static + no-JIT (skips the asmjit dependency) and PIC so it links into
        # the shared libdrm-cxx -- no extra shared object to deploy.
        - pkg: blend2d
          requires_define: DRM_CXX_BLEND2D   # gate: drm::capture / drm::csd
          min: "0"
          url: https://github.com/blend2d/blend2d/archive/refs/heads/master.tar.gz
          build: cmake
          static: true
          defines:
            BLEND2D_STATIC: "ON"
            BLEND2D_NO_JIT: "ON"
            CMAKE_POSITION_INDEPENDENT_CODE: "ON"
        # shadertoy-cxx is a meson-wrap dependency that shadertoy_egl links via
        # find_package; cross-build + install it into the sysroot here so a plain
        # `emb cross --build` picks up shadertoy_egl instead of skipping it.
        - pkg: shadertoy-cxx
          requires_define: DRM_CXX_EGL       # gate: shadertoy_egl (needs EGL)
          min: "0.3.0"
          url: https://github.com/jwinarske/shadertoy-cxx/archive/refs/heads/main.tar.gz
          build: cmake
          static: true
        # libcamera for the camera example, built from the exact raspios rpt tag
        # the Pi runs (v0.7.1+rpt20260609) so the linked SONAME (.so.0.7) matches
        # the target's runtime. Debian trixie only ships 0.4 (.so.0.4, ABI-
        # incompatible), so we don't take it from apt. Only the *core* library is
        # needed to link against -- the pipeline handlers + IPAs come from the
        # Pi's own libcamera install at run time -- so everything optional is off.
        - pkg: libcamera
          requires_define: DRM_CXX_BUILD_CAMERA  # gate: camera example
          # >= 0.7 so a base image that ships Debian's generic libcamera 0.4
          # doesn't satisfy the check -- we need the rpt 0.7 built below.
          min: "0.7"
          url: https://github.com/raspberrypi/libcamera/archive/refs/tags/v0.7.1+rpt20260609.tar.gz
          build: meson
          static: false
          defines:
            pipelines: ""
            ipas: ""
            gstreamer: "disabled"
            v4l2: "false"
            cam: "disabled"
            qcam: "disabled"
            lc-compliance: "disabled"
            documentation: "disabled"
            pycamera: "disabled"
            tracing: "disabled"
            test: "false"
      # Pi 4 is the fence-validation DUT (real v3d GPU + vc4 atomic KMS): build the
      # gtest suite so IN_FENCE_FD / OUT_FENCE_PTR can be exercised against a real
      # KMS card that produces genuine GPU acquire fences. Mirrors the rpi5 block;
      # only -mcpu differs (a72 vs a76), so the Pi 4 needs its own binaries.
      backends: &backends_examples
        examples:
          DRM_CXX_BUILD_EXAMPLES: 'ON'
          DRM_CXX_BUILD_TESTS: 'ON'
          DRM_CXX_BUILD_BENCHMARKS: 'OFF'
          DRM_CXX_VULKAN: 'OFF'
          # PRE_TEST defers gtest discovery to ctest run-time on the target
          # (aarch64 binaries can't be enumerated on the x86 host at build time).
          CMAKE_GTEST_DISCOVER_TESTS_DISCOVERY_MODE: 'PRE_TEST'

    rpi5-trixie:
      extends: rpi5-trixie
      defines: *feature_defines
      sysroot:
        dev_packages:
          - libdisplay-info-dev
          - libgtest-dev          # GoogleTest for the on-target gtest binaries
          - libyuv-dev            # camera example: YUY2/MJPEG->NV12 libyuv fallback
          - libjpeg62-turbo-dev   # drm::capture JPEG encoder (libjpeg-turbo)
      # libcamera (0.7, matching the Pi 5's runtime) is built from source in the
      # shared augment above, not taken from Debian apt (which only has 0.4).
      augment: *augment_libs
      # Own backend (not the shared examples anchor) so tests build on rpi5 only:
      # DRM_CXX_BUILD_TESTS=ON cross-builds the gtest suite to run on the Pi's
      # real vc4 KMS card (dumb+PRIME+AddFB2). Feature flags match the examples
      # set so only feature-clean tests build.
      backends:
        examples:
          DRM_CXX_BUILD_EXAMPLES: 'ON'
          DRM_CXX_BUILD_TESTS: 'ON'
          DRM_CXX_BUILD_BENCHMARKS: 'OFF'
          DRM_CXX_VULKAN: 'OFF'
          # Cross-compile: gtest_discover_tests defaults to running each binary at
          # build time to enumerate cases — impossible for aarch64 on an x86 host.
          # PRE_TEST defers discovery to ctest run-time on the target, so the
          # cross-build only links the binaries (we run them directly on the Pi).
          CMAKE_GTEST_DISCOVER_TESTS_DISCOVERY_MODE: 'PRE_TEST'
