name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            version: '13'
            cc: gcc-13
            cxx: g++-13
          - compiler: gcc
            version: '14'
            cc: gcc-14
            cxx: g++-14
          - compiler: clang
            version: '16'
            cc: clang-16
            cxx: clang++-16
          - compiler: clang
            version: '17'
            cc: clang-17
            cxx: clang++-17

    name: ${{ matrix.compiler }}-${{ matrix.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build \
            libdrm-dev libgbm-dev libinput-dev libudev-dev libxkbcommon-dev \
            ${{ matrix.compiler == 'gcc' && format('g++-{0}', matrix.version) || format('clang-{0}', matrix.version) }}

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          meson setup builddir \
            -Dvulkan=false \
            -Dexamples=false \
            -Dtests=false

      - name: Build
        run: ninja -C builddir

      - name: Test
        run: meson test -C builddir --no-rebuild
        if: false  # Enable when tests are implemented
