name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # gcc-12 is the C++17 floor coverage: it's recent enough that
          # ubuntu-24.04 packages it, but old enough that libstdc++'s
          # <expected> / <print> aren't exposed even under -std=c++23 on
          # this stack, so our cpp_std=c++17 build exercises the
          # tl::expected / tcb::span / {fmt} polyfill paths end-to-end.
          - compiler: gcc
            version: '12'
            cc: gcc-12
            cxx: g++-12
          - compiler: gcc
            version: '13'
            cc: gcc-13
            cxx: g++-13
          - compiler: gcc
            version: '14'
            cc: gcc-14
            cxx: g++-14
          - compiler: clang
            version: '19'
            cc: clang-19
            cxx: clang++-19
          - compiler: clang
            version: '20'
            cc: clang-20
            cxx: clang++-20

    name: ${{ matrix.compiler }}-${{ matrix.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: meson ninja-build libdrm-dev libgbm-dev libinput-dev libudev-dev libxkbcommon-dev libdisplay-info-dev libvulkan-dev ${{ matrix.compiler == 'gcc' && format('g++-{0}', matrix.version) || format('clang-{0}', matrix.version) }}
          version: 1.0

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          meson setup builddir \
            -Dvulkan=true \
            -Dexamples=false \
            -Dtests=false

      - name: Build
        run: ninja -C builddir

      - name: Test
        run: meson test -C builddir --no-rebuild
        if: false  # Enable when tests are implemented

  build-cmake:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            version: '13'
            cc: gcc-13
            cxx: g++-13
          - compiler: clang
            version: '19'
            cc: clang-19
            cxx: clang++-19

    name: cmake-${{ matrix.compiler }}-${{ matrix.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: cmake ninja-build pkg-config libdrm-dev libgbm-dev libinput-dev libudev-dev libxkbcommon-dev libdisplay-info-dev libvulkan-dev ${{ matrix.compiler == 'gcc' && format('g++-{0}', matrix.version) || format('clang-{0}', matrix.version) }}
          version: 1.0

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build -G Ninja \
            -DDRM_CXX_VULKAN=ON \
            -DDRM_CXX_BUILD_EXAMPLES=ON \
            -DDRM_CXX_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Install
        run: cmake --install build --prefix "$GITHUB_WORKSPACE/stage"

      - name: Verify install layout
        run: |
          test -f stage/lib/cmake/drm-cxx/drm-cxx-config.cmake \
            || test -f stage/lib64/cmake/drm-cxx/drm-cxx-config.cmake
          test -f stage/lib/pkgconfig/drm-cxx.pc \
            || test -f stage/lib64/pkgconfig/drm-cxx.pc
          test -f stage/include/drm-cxx/core/device.hpp

      - name: Consumer smoke test (find_package)
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          mkdir -p consumer && cd consumer
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.21)
          project(consumer LANGUAGES CXX)
          find_package(drm-cxx REQUIRED)
          add_executable(smoke smoke.cpp)
          target_link_libraries(smoke PRIVATE drm-cxx::drm-cxx)
          EOF
          cat > smoke.cpp <<'EOF'
          #include "core/device.hpp"
          int main() { auto d = drm::Device::open("/dev/null"); (void)d; return 0; }
          EOF
          cmake -S . -B build -G Ninja -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/stage"
          cmake --build build

      - name: Consumer smoke test (add_subdirectory)
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          mkdir -p subdir-consumer && cd subdir-consumer
          cat > CMakeLists.txt <<EOF
          cmake_minimum_required(VERSION 3.21)
          project(subdir_consumer LANGUAGES CXX)
          add_subdirectory("$GITHUB_WORKSPACE" drm-cxx-build)
          add_executable(smoke smoke.cpp)
          target_link_libraries(smoke PRIVATE drm-cxx::drm-cxx)
          EOF
          cat > smoke.cpp <<'EOF'
          #include "core/device.hpp"
          int main() { auto d = drm::Device::open("/dev/null"); (void)d; return 0; }
          EOF
          cmake -S . -B build -G Ninja
          cmake --build build

  lint:
    runs-on: ubuntu-24.04
    name: lint
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: meson ninja-build libdrm-dev libgbm-dev libinput-dev libudev-dev libxkbcommon-dev libdisplay-info-dev libvulkan-dev clang-19 clang-tidy-19 clang-format-19
          version: 1.0

      - name: Configure
        env:
          CC: clang-19
          CXX: clang++-19
        run: |
          meson setup builddir \
            -Dvulkan=true \
            -Dexamples=false \
            -Dtests=false

      - name: Build (generate compile_commands.json)
        run: ninja -C builddir

      - name: clang-tidy
        run: |
          find src -name '*.cpp' | \
            xargs clang-tidy-19 -p builddir

      - name: clang-format
        run: |
          find src examples tests -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format-19 --dry-run --Werror
