name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # gcc-12 is the C++17 floor coverage: it's recent enough that
          # ubuntu-24.04 packages it, but old enough that libstdc++'s
          # <expected> / <print> aren't exposed even under -std=c++23 on
          # this stack, so our cpp_std=c++17 build exercises the
          # tl::expected / tcb::span / {fmt} polyfill paths end-to-end.
          - compiler: gcc
            version: '12'
            cc: gcc-12
            cxx: g++-12
          - compiler: gcc
            version: '13'
            cc: gcc-13
            cxx: g++-13
          - compiler: gcc
            version: '14'
            cc: gcc-14
            cxx: g++-14
          - compiler: clang
            version: '19'
            cc: clang-19
            cxx: clang++-19
          - compiler: clang
            version: '20'
            cc: clang-20
            cxx: clang++-20

    name: ${{ matrix.compiler }}-${{ matrix.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          # hwdata supplies the pnp.ids file libdisplay-info reads at build time.
          packages: meson ninja-build libdrm-dev libgbm-dev libinput-dev libudev-dev libxkbcommon-dev libvulkan-dev hwdata ${{ matrix.compiler == 'gcc' && format('g++-{0}', matrix.version) || format('clang-{0}', matrix.version) }}
          version: 1.0

      # libdisplay-info >=0.2.0 isn't packaged on ubuntu-24.04 (noble ships
      # 0.1.1). Build the 0.2.0 tag from source and cache the install prefix
      # so subsequent CI runs skip the rebuild. We deliberately don't vendor
      # or wrap it: the floor stays system-provided once a distro ships a
      # new enough package.
      - name: Cache libdisplay-info install
        id: cache-libdisplay-info
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/libdisplay-info-install
          key: libdisplay-info-0.2.0-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.version }}

      - name: Build libdisplay-info from source
        if: steps.cache-libdisplay-info.outputs.cache-hit != 'true'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          git clone --depth 1 --branch 0.2.0 https://gitlab.freedesktop.org/emersion/libdisplay-info.git libdisplay-info-src
          meson setup libdisplay-info-src/build libdisplay-info-src \
            --prefix="$GITHUB_WORKSPACE/libdisplay-info-install" \
            --buildtype=release \
            -Ddefault_library=shared
          meson install -C libdisplay-info-src/build

      - name: Export third-party environment
        run: |
          echo "PKG_CONFIG_PATH=$GITHUB_WORKSPACE/libdisplay-info-install/lib/pkgconfig:$GITHUB_WORKSPACE/libdisplay-info-install/lib64/pkgconfig:$GITHUB_WORKSPACE/libdisplay-info-install/lib/x86_64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$GITHUB_WORKSPACE/libdisplay-info-install/lib:$GITHUB_WORKSPACE/libdisplay-info-install/lib64:$GITHUB_WORKSPACE/libdisplay-info-install/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          meson setup builddir \
            -Dvulkan=true \
            -Dexamples=false \
            -Dtests=false

      - name: Build
        run: ninja -C builddir

      - name: Test
        run: meson test -C builddir --no-rebuild
        if: false  # Enable when tests are implemented

  # C++23 lane. Every matrix above compiles with the default cpp_std=c++17, so
  # the std::format / std::println path that detail/format.hpp selects under
  # C++23 (libstdc++ 14+) is otherwise never exercised in CI. std::format's
  # compile-time format-string checker is stricter than {fmt} — e.g. an
  # unescaped literal brace is a hard error, not a runtime surprise — so this
  # lane builds the library AND examples under -Dcpp_std=c++23 to catch those
  # before merge. (egl_scene shipped exactly that bug.) gcc-14 is the floor that
  # exposes <print> on ubuntu-24.04; gcc-12/13 don't, so they'd silently fall
  # back to the {fmt} path and guard nothing.
  build-cxx23:
    runs-on: ubuntu-24.04
    name: gcc-14-cxx23

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          # Examples are built here (the std::format path is used heavily in
          # examples — the bug this lane guards lived in egl_scene), so pull the
          # example-facing deps too: libegl/libgles (egl_scene + gl_present land
          # on a present `egl`/`glesv2` dependency, independent of -Degl),
          # libxcursor (mouse_cursor/xcursor_smoke link the library's cursor
          # module unconditionally), libseat (session), libgstreamer
          # (GstAppsinkSource + video_player). blend2d / libcamera / thorvg
          # examples auto-skip without their deps (they're feature-gated), which
          # is fine — the std::format coverage they'd add is verified elsewhere.
          # hwdata supplies the pnp.ids file libdisplay-info reads at build time.
          packages: meson ninja-build libdrm-dev libgbm-dev libinput-dev libudev-dev libxkbcommon-dev libvulkan-dev libseat-dev libxcursor-dev libegl1-mesa-dev libgles2-mesa-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev hwdata g++-14
          version: 1.0

      # libdisplay-info >=0.2.0 isn't packaged on ubuntu-24.04 (noble ships
      # 0.1.1). Same source-build + cache pattern as the other jobs.
      - name: Cache libdisplay-info install
        id: cache-libdisplay-info
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/libdisplay-info-install
          key: libdisplay-info-0.2.0-${{ runner.os }}-gcc-14

      - name: Build libdisplay-info from source
        if: steps.cache-libdisplay-info.outputs.cache-hit != 'true'
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          git clone --depth 1 --branch 0.2.0 https://gitlab.freedesktop.org/emersion/libdisplay-info.git libdisplay-info-src
          meson setup libdisplay-info-src/build libdisplay-info-src \
            --prefix="$GITHUB_WORKSPACE/libdisplay-info-install" \
            --buildtype=release \
            -Ddefault_library=shared
          meson install -C libdisplay-info-src/build

      - name: Export third-party environment
        run: |
          echo "PKG_CONFIG_PATH=$GITHUB_WORKSPACE/libdisplay-info-install/lib/pkgconfig:$GITHUB_WORKSPACE/libdisplay-info-install/lib64/pkgconfig:$GITHUB_WORKSPACE/libdisplay-info-install/lib/x86_64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$GITHUB_WORKSPACE/libdisplay-info-install/lib:$GITHUB_WORKSPACE/libdisplay-info-install/lib64:$GITHUB_WORKSPACE/libdisplay-info-install/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Configure (C++23)
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          meson setup builddir \
            -Dcpp_std=c++23 \
            -Dvulkan=true \
            -Dexamples=true \
            -Dtests=false

      - name: Build
        run: ninja -C builddir

  build-cmake:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            version: '13'
            cc: gcc-13
            cxx: g++-13
          - compiler: clang
            version: '19'
            cc: clang-19
            cxx: clang++-19

    name: cmake-${{ matrix.compiler }}-${{ matrix.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          # libyuv-dev satisfies examples/scene/camera's libyuv pkg-config probe.
          # libva-dev (libva + libva-drm) lights up the camera example's
          # hardware MJPEG decode path; without it the example silently
          # falls back to CPU libyuv decode.
          # python3-{yaml,jinja2,ply} + libyaml-dev are libcamera build deps
          # (yaml/jinja2/ply drive its source-generators; libyaml-dev is the
          # runtime config parser). hwdata supplies the pnp.ids file
          # libdisplay-info reads at build time.
          packages: cmake meson ninja-build pkg-config libdrm-dev libgbm-dev libinput-dev libudev-dev libxkbcommon-dev libvulkan-dev libseat-dev libxcursor-dev libyuv-dev libva-dev libyaml-dev python3-yaml python3-jinja2 python3-ply hwdata ${{ matrix.compiler == 'gcc' && format('g++-{0}', matrix.version) || format('clang-{0}', matrix.version) }}
          version: 1.0

      # libdisplay-info >=0.2.0 isn't packaged on ubuntu-24.04 (noble ships
      # 0.1.1). Build the 0.2.0 tag from source and cache the install prefix.
      - name: Cache libdisplay-info install
        id: cache-libdisplay-info
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/libdisplay-info-install
          key: libdisplay-info-0.2.0-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.version }}

      - name: Build libdisplay-info from source
        if: steps.cache-libdisplay-info.outputs.cache-hit != 'true'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          git clone --depth 1 --branch 0.2.0 https://gitlab.freedesktop.org/emersion/libdisplay-info.git libdisplay-info-src
          meson setup libdisplay-info-src/build libdisplay-info-src \
            --prefix="$GITHUB_WORKSPACE/libdisplay-info-install" \
            --buildtype=release \
            -Ddefault_library=shared
          meson install -C libdisplay-info-src/build

      # ThorVG 1.0.4 isn't packaged on ubuntu-24.04; build from source and cache
      # the install prefix so subsequent CI runs skip the rebuild.
      - name: Cache thorvg install
        id: cache-thorvg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/thorvg-install
          key: thorvg-v1.0.4-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.version }}

      - name: Build thorvg from source
        if: steps.cache-thorvg.outputs.cache-hit != 'true'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          git clone --depth 1 --branch v1.0.4 https://github.com/thorvg/thorvg.git thorvg-src
          meson setup thorvg-src/build thorvg-src \
            --prefix="$GITHUB_WORKSPACE/thorvg-install" \
            --buildtype=release \
            -Dengines=cpu \
            -Dloaders=svg,lottie,ttf \
            -Dsavers= \
            -Dbindings=capi \
            -Dtools= \
            -Dextra=lottie_exp \
            -Dtests=false \
            -Dstatic=false
          meson install -C thorvg-src/build

      # Blend2D — also not packaged on ubuntu-24.04. Same pattern as thorvg:
      # clone, build, install to a cache-keyed prefix, export the paths.
      # Without this, DRM_CXX_BLEND2D resolves to OFF and drm::capture plus
      # its unit + integration tests silently drop out of the CI matrix.
      - name: Cache blend2d install
        id: cache-blend2d
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/blend2d-install
          key: blend2d-main-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.version }}

      - name: Build blend2d from source
        if: steps.cache-blend2d.outputs.cache-hit != 'true'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          git clone --depth 1 https://github.com/asmjit/asmjit asmjit-src
          git clone --depth 1 https://github.com/blend2d/blend2d blend2d-src
          cmake -S blend2d-src -B blend2d-src/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/blend2d-install" \
            -DASMJIT_DIR="$GITHUB_WORKSPACE/asmjit-src" \
            -DBLEND2D_STATIC=FALSE \
            -DBLEND2D_TEST=FALSE
          cmake --build blend2d-src/build
          cmake --install blend2d-src/build

      # libcamera 0.3+ isn't packaged on Ubuntu 24.04 (noble ships 0.2.0).
      # Build a recent stable tag from source so examples/scene/camera's
      # libcamera>=0.3.0 pkg-config probe is satisfied. Same cache pattern
      # as thorvg / blend2d; bump the version literal here and in the
      # cache key together.
      - name: Cache libcamera install
        id: cache-libcamera
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/libcamera-install
          key: libcamera-v0.5.2-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.version }}

      - name: Build libcamera from source
        if: steps.cache-libcamera.outputs.cache-hit != 'true'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          git clone --depth 1 --branch v0.5.2 https://git.libcamera.org/libcamera/libcamera.git libcamera-src
          meson setup libcamera-src/build libcamera-src \
            --prefix="$GITHUB_WORKSPACE/libcamera-install" \
            --buildtype=release \
            -Dpipelines=uvcvideo \
            -Dipas= \
            -Dgstreamer=disabled \
            -Dpycamera=disabled \
            -Dqcam=disabled \
            -Ddocumentation=disabled \
            -Dlc-compliance=disabled \
            -Dcam=disabled \
            -Dv4l2=disabled \
            -Dtracing=disabled \
            -Dtest=false
          meson install -C libcamera-src/build

      # libseat replaces the old sdbus-c++-from-source dance: it's packaged
      # on Ubuntu 24.04 as libseat-dev and pulled in via apt above. thorvg,
      # blend2d, libcamera, and libdisplay-info still need their install
      # prefixes exported.
      - name: Export third-party environment
        run: |
          echo "PKG_CONFIG_PATH=$GITHUB_WORKSPACE/thorvg-install/lib/pkgconfig:$GITHUB_WORKSPACE/thorvg-install/lib64/pkgconfig:$GITHUB_WORKSPACE/libcamera-install/lib/pkgconfig:$GITHUB_WORKSPACE/libcamera-install/lib64/pkgconfig:$GITHUB_WORKSPACE/libcamera-install/lib/x86_64-linux-gnu/pkgconfig:$GITHUB_WORKSPACE/libdisplay-info-install/lib/pkgconfig:$GITHUB_WORKSPACE/libdisplay-info-install/lib64/pkgconfig:$GITHUB_WORKSPACE/libdisplay-info-install/lib/x86_64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/thorvg-install:$GITHUB_WORKSPACE/blend2d-install:$GITHUB_WORKSPACE/libcamera-install:$GITHUB_WORKSPACE/libdisplay-info-install:$CMAKE_PREFIX_PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$GITHUB_WORKSPACE/thorvg-install/lib:$GITHUB_WORKSPACE/thorvg-install/lib64:$GITHUB_WORKSPACE/blend2d-install/lib:$GITHUB_WORKSPACE/blend2d-install/lib64:$GITHUB_WORKSPACE/libcamera-install/lib:$GITHUB_WORKSPACE/libcamera-install/lib64:$GITHUB_WORKSPACE/libcamera-install/lib/x86_64-linux-gnu:$GITHUB_WORKSPACE/libdisplay-info-install/lib:$GITHUB_WORKSPACE/libdisplay-info-install/lib64:$GITHUB_WORKSPACE/libdisplay-info-install/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build -G Ninja \
            -DDRM_CXX_VULKAN=ON \
            -DDRM_CXX_BUILD_EXAMPLES=ON \
            -DDRM_CXX_BUILD_TESTS=ON \
            -DDRM_CXX_BUILD_THORVG_JANITOR=ON \
            -DDRM_CXX_BUILD_CAMERA=ON \
            -DDRM_CXX_SESSION=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Install
        run: cmake --install build --prefix "$GITHUB_WORKSPACE/stage"

      - name: Verify install layout
        run: |
          test -f stage/lib/cmake/drm-cxx/drm-cxx-config.cmake \
            || test -f stage/lib64/cmake/drm-cxx/drm-cxx-config.cmake
          test -f stage/lib/pkgconfig/drm-cxx.pc \
            || test -f stage/lib64/pkgconfig/drm-cxx.pc
          test -f stage/include/drm-cxx/core/device.hpp
          # cursor-load ships its own archive, pkg-config file, and the two
          # public headers a loader-only consumer needs.
          test -f stage/lib/libdrm-cxx-cursor-load.a \
            || test -f stage/lib64/libdrm-cxx-cursor-load.a
          test -f stage/lib/pkgconfig/drm-cxx-cursor-load.pc \
            || test -f stage/lib64/pkgconfig/drm-cxx-cursor-load.pc
          test -f stage/include/drm-cxx/cursor/cursor.hpp
          test -f stage/include/drm-cxx/cursor/theme.hpp

      - name: Consumer smoke test (find_package)
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          mkdir -p consumer && cd consumer
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.21)
          project(consumer LANGUAGES CXX)
          find_package(drm-cxx REQUIRED)
          add_executable(smoke smoke.cpp)
          target_link_libraries(smoke PRIVATE drm-cxx::drm-cxx)
          EOF
          cat > smoke.cpp <<'EOF'
          #include "core/device.hpp"
          int main() { auto d = drm::Device::open("/dev/null"); (void)d; return 0; }
          EOF
          cmake -S . -B build -G Ninja -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/stage"
          cmake --build build

      - name: Consumer smoke test (add_subdirectory)
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          mkdir -p subdir-consumer && cd subdir-consumer
          cat > CMakeLists.txt <<EOF
          cmake_minimum_required(VERSION 3.21)
          project(subdir_consumer LANGUAGES CXX)
          add_subdirectory("$GITHUB_WORKSPACE" drm-cxx-build)
          add_executable(smoke smoke.cpp)
          target_link_libraries(smoke PRIVATE drm-cxx::drm-cxx)
          EOF
          cat > smoke.cpp <<'EOF'
          #include "core/device.hpp"
          int main() { auto d = drm::Device::open("/dev/null"); (void)d; return 0; }
          EOF
          cmake -S . -B build -G Ninja
          cmake --build build

      # The whole point of cursor-load is that a consumer can resolve and
      # rasterize XCursor themes without the display stack. The matrix above
      # only proves it compiles inside the full library; this step proves the
      # standalone-link guarantee — via both the CMake export target and the
      # pkg-config file — by asserting the linked binary pulls in no
      # drm/gbm/input/udev/xkb/EGL/vulkan/seat shared library.
      - name: Consumer smoke test (cursor-load, no display deps)
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          set -euo pipefail
          assert_no_display_deps() {
            echo "== ldd $1 =="
            ldd "$1" || true
            if ldd "$1" | grep -Eiq 'libdrm|libgbm|libinput|libudev|libxkb|libEGL|libGLES|libvulkan|libseat'; then
              echo "ERROR: $1 pulled in a display-stack library"; exit 1
            fi
            echo "OK: $1 links no display-stack libraries"
          }

          cat > cl.cpp <<'EOF'
          #include "cursor/cursor.hpp"
          #include "cursor/theme.hpp"
          #include <cstdint>
          #include <cstdio>
          int main() {
            (void)drm::cursor::Theme::discover();  // absent theme on a headless runner is fine
            std::uint32_t px[4] = {0xFFFFFFFFu, 0u, 0u, 0xFFFFFFFFu};
            auto cur = drm::cursor::Cursor::from_argb(
                drm::span<const std::uint32_t>(px, 4), 2, 2, 0, 0);
            if (!cur) { std::puts("from_argb failed"); return 1; }
            std::printf("frames=%zu %ux%u\n", cur->frame_count(),
                        cur->first().width, cur->first().height);
            return 0;
          }
          EOF

          # CMake export path: find_package -> drm-cxx::cursor-load.
          mkdir -p cl-cmake && cp cl.cpp cl-cmake/
          cat > cl-cmake/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.21)
          project(cursor_load_consumer LANGUAGES CXX)
          find_package(drm-cxx REQUIRED)
          add_executable(cl cl.cpp)
          target_link_libraries(cl PRIVATE drm-cxx::cursor-load)
          EOF
          cmake -S cl-cmake -B cl-cmake/build -G Ninja -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/stage"
          cmake --build cl-cmake/build
          ./cl-cmake/build/cl
          assert_no_display_deps ./cl-cmake/build/cl

          # pkg-config path: drm-cxx-cursor-load.pc, standalone. --define-prefix
          # recomputes ${prefix} from the .pc location, since cmake bakes the
          # configure-time prefix into the generated file.
          pc_dir="$(dirname "$(find "$GITHUB_WORKSPACE/stage" -name drm-cxx-cursor-load.pc | head -n1)")"
          export PKG_CONFIG_PATH="$pc_dir:${PKG_CONFIG_PATH:-}"
          pkg-config --define-prefix --exists drm-cxx-cursor-load
          "$CXX" -std=c++17 -Wall -Wextra \
            $(pkg-config --define-prefix --cflags drm-cxx-cursor-load) \
            cl.cpp \
            $(pkg-config --define-prefix --libs drm-cxx-cursor-load) \
            -o cl-pc
          ./cl-pc
          assert_no_display_deps ./cl-pc

  lint:
    runs-on: ubuntu-24.04
    name: lint
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'
          # Full history so the PR clang-tidy pass can diff against the base
          # branch and lint only the files this PR changes (see the clang-tidy
          # step). Push-to-main runs tidy the whole tree regardless.
          fetch-depth: 0

      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          # libyuv-dev satisfies examples/scene/camera's libyuv pkg-config probe.
          # libgstreamer1.0-dev / libgstreamer-plugins-base1.0-dev satisfy the
          # gstreamer-1.0 / gstreamer-app-1.0 / gstreamer-allocators-1.0 /
          # gstreamer-video-1.0 probes so scene/gst_appsink_source.cpp and
          # examples/scene/video_player land in compile_commands.json with
          # proper include paths — without them tidy's find-walk parses
          # video_player/main.cpp with default flags and reports bogus
          # "<gst/gst.h> not found" / "<memory> unused" lints.
          # python3-{yaml,jinja2,ply} + libyaml-dev are libcamera build deps.
          # libva-dev (libva + libva-drm) covers the camera example's
          # vaapi_jpeg_decoder TU so it lands in compile_commands.json
          # for tidy; absent, tidy walks it with default flags and lints
          # a half-parsed TU.
          # libegl1-mesa-dev + libgles2-mesa-dev cover scene/egl_runtime,
          # scene/stream_capability, scene/egl_stream_source, and
          # scene/egl_stream_builder so the EGL Streams TUs land in
          # compile_commands.json for tidy. Mesa's libEGL is enough for
          # the headers — no NVIDIA proprietary userspace needed at lint
          # time; the runtime probe only ever reports Unsupported on
          # Mesa hosts (intentional and tested).
          # hwdata supplies the pnp.ids file libdisplay-info reads at build time.
          # glslang-tools provides glslangValidator so cluster_sim_vulkan's
          # SPV-header custom_targets fire and the TU lands in
          # compile_commands.json (without it, meson hits subdir_done() and
          # tidy's find-walk lints the file with default flags, then reports
          # bogus "bg_frag_spv.h not found" / unused-include / uninitialized-
          # variable cascades from the parse failure).
          packages: cmake meson ninja-build libdrm-dev libgbm-dev libinput-dev libudev-dev libxkbcommon-dev libvulkan-dev libseat-dev libxcursor-dev libyuv-dev libva-dev libegl1-mesa-dev libgles2-mesa-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libyaml-dev python3-yaml python3-jinja2 python3-ply hwdata clang-19 clang-tidy-19 clang-format-19 glslang-tools
          version: 1.0

      # libdisplay-info >=0.2.0 isn't packaged on ubuntu-24.04 (noble ships
      # 0.1.1). Without it, src/display/edid.cpp drops out of
      # compile_commands.json entirely and clang-tidy's find-walk falls back
      # to default flags, spuriously flagging include / init issues on the
      # partial parse.
      - name: Cache libdisplay-info install
        id: cache-libdisplay-info
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/libdisplay-info-install
          key: libdisplay-info-0.2.0-${{ runner.os }}-clang-19

      - name: Build libdisplay-info from source
        if: steps.cache-libdisplay-info.outputs.cache-hit != 'true'
        env:
          CC: clang-19
          CXX: clang++-19
        run: |
          git clone --depth 1 --branch 0.2.0 https://gitlab.freedesktop.org/emersion/libdisplay-info.git libdisplay-info-src
          meson setup libdisplay-info-src/build libdisplay-info-src \
            --prefix="$GITHUB_WORKSPACE/libdisplay-info-install" \
            --buildtype=release \
            -Ddefault_library=shared
          meson install -C libdisplay-info-src/build

      # Blend2D isn't packaged on ubuntu-24.04 (upstream ships no stable
      # releases, only git master). Build + cache the install prefix so
      # the capture/ TUs end up in compile_commands.json and clang-tidy
      # has <blend2d/*> headers on the include path. Without this, tidy's
      # find-walk of every .cpp hits an empty compile_commands entry for
      # capture/ and bails with "Blend2D headers not found".
      - name: Cache blend2d install
        id: cache-blend2d
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/blend2d-install
          key: blend2d-main-${{ runner.os }}-clang-19

      - name: Build blend2d from source
        if: steps.cache-blend2d.outputs.cache-hit != 'true'
        env:
          CC: clang-19
          CXX: clang++-19
        run: |
          git clone --depth 1 https://github.com/asmjit/asmjit asmjit-src
          git clone --depth 1 https://github.com/blend2d/blend2d blend2d-src
          cmake -S blend2d-src -B blend2d-src/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/blend2d-install" \
            -DASMJIT_DIR="$GITHUB_WORKSPACE/asmjit-src" \
            -DBLEND2D_STATIC=FALSE \
            -DBLEND2D_TEST=FALSE
          cmake --build blend2d-src/build
          cmake --install blend2d-src/build

      # libcamera 0.3+ isn't packaged on Ubuntu 24.04 (noble ships 0.2.0).
      # Without it, examples/scene/camera/*.cpp drops out of compile_commands.json
      # and clang-tidy's find-walk falls back to default flags, which then
      # spuriously flag init/include-cleaner issues on the partial parse.
      # Build a recent stable tag from source so the camera TUs end up in
      # compile_commands.json with proper include paths.
      - name: Cache libcamera install
        id: cache-libcamera
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/libcamera-install
          key: libcamera-v0.5.2-${{ runner.os }}-clang-19

      - name: Build libcamera from source
        if: steps.cache-libcamera.outputs.cache-hit != 'true'
        env:
          CC: clang-19
          CXX: clang++-19
        run: |
          git clone --depth 1 --branch v0.5.2 https://git.libcamera.org/libcamera/libcamera.git libcamera-src
          meson setup libcamera-src/build libcamera-src \
            --prefix="$GITHUB_WORKSPACE/libcamera-install" \
            --buildtype=release \
            -Dpipelines=uvcvideo \
            -Dipas= \
            -Dgstreamer=disabled \
            -Dpycamera=disabled \
            -Dqcam=disabled \
            -Ddocumentation=disabled \
            -Dlc-compliance=disabled \
            -Dcam=disabled \
            -Dv4l2=disabled \
            -Dtracing=disabled \
            -Dtest=false
          meson install -C libcamera-src/build

      - name: Export third-party environment
        run: |
          echo "PKG_CONFIG_PATH=$GITHUB_WORKSPACE/libcamera-install/lib/pkgconfig:$GITHUB_WORKSPACE/libcamera-install/lib64/pkgconfig:$GITHUB_WORKSPACE/libcamera-install/lib/x86_64-linux-gnu/pkgconfig:$GITHUB_WORKSPACE/libdisplay-info-install/lib/pkgconfig:$GITHUB_WORKSPACE/libdisplay-info-install/lib64/pkgconfig:$GITHUB_WORKSPACE/libdisplay-info-install/lib/x86_64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/blend2d-install:$GITHUB_WORKSPACE/libcamera-install:$GITHUB_WORKSPACE/libdisplay-info-install:$CMAKE_PREFIX_PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$GITHUB_WORKSPACE/blend2d-install/lib:$GITHUB_WORKSPACE/blend2d-install/lib64:$GITHUB_WORKSPACE/libcamera-install/lib:$GITHUB_WORKSPACE/libcamera-install/lib64:$GITHUB_WORKSPACE/libcamera-install/lib/x86_64-linux-gnu:$GITHUB_WORKSPACE/libdisplay-info-install/lib:$GITHUB_WORKSPACE/libdisplay-info-install/lib64:$GITHUB_WORKSPACE/libdisplay-info-install/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Configure
        env:
          CC: clang-19
          CXX: clang++-19
        run: |
          meson setup builddir \
            -Dvulkan=true \
            -Dexamples=true \
            -Dcamera=enabled \
            -Dtests=false \
            -Db_lto=false

      - name: Build (generate compile_commands.json)
        run: ninja -C builddir

      # Tidy src + every example except the vendored thorvg_janitor tree
      # (has its own LICENSE and tracks upstream; pruning it here matches
      # the -isystem rationale for {fmt}).
      #
      # Parallelized across all runner cores (xargs -P), and on pull_request
      # only the .cpp files the PR changes are tidied — the push-to-main run
      # re-tidies the whole tree as the regression net, so cross-file breakage a
      # changed-files pass can't see is still caught on merge. This turns a
      # ~20-30 min serial full-tree gate into seconds for a typical PR.
      - name: clang-tidy
        run: |
          set -euo pipefail
          jobs="$(nproc)"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="origin/${{ github.base_ref }}"
            git fetch --no-tags --quiet origin "${{ github.base_ref }}"
            # Restrict to src/ + examples/ (minus the vendored thorvg tree),
            # matching the full-tree `find src examples` scope below. tests/ is
            # intentionally never tidied (its CHECK harness uses do-while etc.).
            mapfile -t files < <(git diff --name-only --diff-filter=d "${base_ref}...HEAD" \
              | grep -E '^(src|examples)/.*\.cpp$' \
              | grep -v '^examples/scene/thorvg_janitor/' || true)
            if [ "${#files[@]}" -eq 0 ]; then
              echo "clang-tidy: no changed .cpp files to lint"
              exit 0
            fi
            printf 'clang-tidy: %d changed file(s), %s job(s)\n' "${#files[@]}" "$jobs"
            printf '%s\n' "${files[@]}" | xargs -P "$jobs" -n 1 clang-tidy-19 -p builddir
          else
            echo "clang-tidy: full tree, $jobs job(s)"
            find src examples -name '*.cpp' -not -path 'examples/scene/thorvg_janitor/*' \
              | xargs -P "$jobs" -n 1 clang-tidy-19 -p builddir
          fi

      - name: clang-format
        run: |
          find src examples tests -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format-19 --dry-run --Werror
