name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            version: '13'
            cc: gcc-13
            cxx: g++-13
          - compiler: gcc
            version: '14'
            cc: gcc-14
            cxx: g++-14
          - compiler: clang
            version: '19'
            cc: clang-19
            cxx: clang++-19
          - compiler: clang
            version: '20'
            cc: clang-20
            cxx: clang++-20

    name: ${{ matrix.compiler }}-${{ matrix.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build \
            libdrm-dev libgbm-dev libinput-dev libudev-dev libxkbcommon-dev \
            libdisplay-info-dev libvulkan-dev \
            ${{ matrix.compiler == 'gcc' && format('g++-{0}', matrix.version) || format('clang-{0}', matrix.version) }}

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          meson setup builddir \
            -Dvulkan=true \
            -Dexamples=false \
            -Dtests=false

      - name: Build
        run: ninja -C builddir

      - name: Test
        run: meson test -C builddir --no-rebuild
        if: false  # Enable when tests are implemented

  lint:
    runs-on: ubuntu-24.04
    name: lint
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build \
            libdrm-dev libgbm-dev libinput-dev libudev-dev libxkbcommon-dev \
            libdisplay-info-dev libvulkan-dev \
            clang-19 clang-tidy-19 clang-format-19

      - name: Configure
        env:
          CC: clang-19
          CXX: clang++-19
        run: |
          meson setup builddir \
            -Dvulkan=true \
            -Dexamples=false \
            -Dtests=false

      - name: Build (generate compile_commands.json)
        run: ninja -C builddir

      - name: clang-tidy
        run: |
          find drm-cxx -name '*.cpp' | \
            xargs clang-tidy-19 -p builddir

      - name: clang-format
        run: |
          find drm-cxx examples tests -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format-19 --dry-run --Werror
