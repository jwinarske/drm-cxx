# Sample signage_player playlist. Each [[slide]] entry runs for
# duration_ms before the next one cycles in. The optional [overlay]
# block paints a banner near the bottom third of the display.
#
# Today only kind="color" actually renders content — the png /
# blend2d / thorvg backends are parsed, but their renderers land in
# follow-up commits.

[[slide]]
kind = "color"
color = "#ff5722"
duration_ms = 2000

[[slide]]
kind = "color"
color = "#2196f3"
duration_ms = 2000

[[slide]]
kind = "color"
color = "#4caf50"
duration_ms = 2000

[[slide]]
kind = "color"
color = "#9c27b0"
duration_ms = 2000

[overlay]
kind = "text"
text = "drm-cxx signage demo"
font_size = 32
fg_color = "#ffffff"
bg_color = "#80000000"
